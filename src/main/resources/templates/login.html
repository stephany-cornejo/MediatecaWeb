<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Biblioteca - Iniciar sesión</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fb; margin:0; padding:0; display:flex; align-items:center; justify-content:center; height:100vh; }
        .card { width: 360px; background: white; padding: 28px; border-radius: 14px; box-shadow: 0 16px 50px rgba(0,0,0,0.08); }
        h1 { margin: 0 0 14px; font-size: 24px; color: #1f2937; text-align: center; }
        label { display:block; margin: 14px 0 6px; color:#475569; font-size: 14px; }
        input { width:100%; padding:8px 10px; height:40px; box-sizing:border-box; border:1px solid #d1d5db; border-radius:10px; font-size: 15px; }
        button { margin-top: 20px; width:100%; padding:12px; border:none; border-radius:10px; background:#2563eb; color:white; font-size:16px; cursor:pointer; }
        .error { margin-top:18px; color:#b91c1c; text-align:center; }
        .footer { margin-top: 22px; color:#64748b; font-size:13px; text-align:center; }
    </style>
</head>
<body>
<div class="card">
    <h1>Biblioteca</h1>
    <form th:action="@{/login}" method="post">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" placeholder="Usuario" required />

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" placeholder="Contraseña" required />

        <button type="submit">Ingresar</button>
    </form>
    <p th:if="${error}" th:text="${error}" class="error"></p>
    <div style="margin-top:18px; text-align:center;">
        <a href="/consultas" style="color:#2563eb; font-size:14px; text-decoration:none;">Consulta pública de ejemplares</a>
    </div>
    <div class="footer">Versión web inicial de la aplicación de biblioteca.</div>
</div>
</body>
</html>
