<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Préstamos - Biblioteca</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 0; }
        .page { max-width: 1120px; margin: 24px auto; padding: 24px; }
        .header { display:flex; justify-content:space-between; align-items:center; background:#4338ca; color:white; padding:18px; border-radius:16px; }
        .header a { color:#e0e7ff; text-decoration:none; }
        .button { display:inline-block; background:#2563eb; color:white; padding:12px 18px; border-radius:10px; text-decoration:none; }
        .table { width:100%; border-collapse:collapse; margin-top:18px; }
        .table th, .table td { padding:14px 12px; border-bottom:1px solid #e2e8f0; text-align:left; }
        .table th { background:#eef2ff; }
        .alert { padding:14px 16px; border-radius:12px; margin: 16px 0; }
        .alert-success { background:#dcfce7; color:#166534; }
        .alert-error { background:#fee2e2; color:#991b1b; }
        form { margin-top: 18px; }
        input[type=number] { width: 120px; padding:8px 10px; border:1px solid #cbd5e1; border-radius:10px; }
        button { padding:10px 16px; border:none; border-radius:10px; background:#2563eb; color:white; cursor:pointer; }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div>
            <h1>Préstamos activos</h1>
            <p th:text="'Administrador: ' + ${username}"></p>
        </div>
        <div>
            <a class="button" th:href="@{/admin/usuarios}">Usuarios</a>
            <a class="button" th:href="@{/admin/documentos}">Documentos</a>
            <a class="button" th:href="@{/admin/configuracion}">Configuración</a>
            <a class="button" th:href="@{/dashboard}">Inicio</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Documento</th>
                <th>Salida</th>
                <th>Devolución</th>
                <th>Mora</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="prestamo : ${prestamos}">
                <td th:text="${prestamo.id}"></td>
                <td th:text="${prestamo.usuarioNombre}"></td>
                <td th:text="${prestamo.documentoTitulo}"></td>
                <td th:text="${prestamo.fechaSalida}"></td>
                <td th:text="${prestamo.fechaDevolucion}"></td>
                <td th:text="${prestamo.mora}"></td>
            </tr>
        </tbody>
    </table>

    <form th:action="@{/admin/prestamos/devolver}" method="post">
        <label for="prestamoId">ID de préstamo para devolver:</label>
        <input id="prestamoId" name="prestamoId" type="number" min="1" required />
        <button type="submit">Registrar devolución</button>
    </form>
</div>
</body>
</html>
