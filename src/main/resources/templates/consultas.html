<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Consultas - Biblioteca</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fb; margin: 0; padding: 0; }
        .page { max-width: 1120px; margin: 24px auto; padding: 24px; }
        .header { display:flex; justify-content:space-between; align-items:center; background:#4338ca; color:white; padding:18px; border-radius:16px; }
        .header a { color:#e0e7ff; text-decoration:none; }
        .card { background:white; border-radius:18px; padding:24px; box-shadow:0 18px 40px rgba(15,23,42,0.08); margin-top:18px; }
        .form-row { display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:12px; align-items:end; }
        label { display:block; margin-bottom:8px; color:#334155; font-weight:600; }
        input, select { width:100%; padding:8px 10px; min-height:40px; box-sizing:border-box; border:1px solid #cbd5e1; border-radius:12px; font-size:16px; }
        button { padding:13px 18px; border:none; border-radius:14px; background:#2563eb; color:white; font-size:16px; cursor:pointer; }
        .table { width:100%; border-collapse:collapse; margin-top:24px; }
        .table th, .table td { padding:14px 12px; border-bottom:1px solid #e2e8f0; text-align:left; }
        .table th { background:#eef2ff; }
        .muted { color:#64748b; font-size:14px; }
        .actions { display:flex; gap:14px; }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div>
            <h1>Consulta de ejemplares</h1>
            <p class="muted">Busca títulos disponibles sin iniciar sesión.</p>
        </div>
        <div class="actions">
            <a href="/login">Iniciar sesión</a>
        </div>
    </div>

    <div class="card">
        <form th:action="@{/consultas}" method="get">
            <div class="form-row">
                <div>
                    <label for="palabra">Buscar por título, ubicación o datos</label>
                    <input id="palabra" name="palabra" type="text" th:value="${palabra}" placeholder="Palabra clave" />
                </div>
                <div>
                    <label for="tipo">Tipo de ejemplar</label>
                    <select id="tipo" name="tipo">
                        <option value="" th:selected="${tipo} == ''">Todos</option>
                        <option value="LIBRO" th:selected="${tipo} == 'LIBRO'">Libro</option>
                        <option value="REVISTA" th:selected="${tipo} == 'REVISTA'">Revista</option>
                        <option value="CD" th:selected="${tipo} == 'CD'">CD</option>
                        <option value="TESIS" th:selected="${tipo} == 'TESIS'">Tesis</option>
                    </select>
                </div>
                <div>
                    <label>&nbsp;</label>
                    <button type="submit">Buscar</button>
                </div>
            </div>
        </form>

        <table class="table" th:if="${resultados} != null">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Tipo</th>
                    <th>Ubicación</th>
                    <th>Disponibles</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="documento : ${resultados}">
                    <td th:text="${documento.id}"></td>
                    <td th:text="${documento.titulo}"></td>
                    <td th:text="${documento.tipo}"></td>
                    <td th:text="${documento.ubicacion}"></td>
                    <td th:text="${documento.stockDisponible}"></td>
                    <td th:text="${documento.stockTotal}"></td>
                </tr>
                <tr th:if="${resultados.size()} == 0">
                    <td colspan="6" style="text-align:center; color:#64748b;">No se encontraron ejemplares con esos criterios.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
