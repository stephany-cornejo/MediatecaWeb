<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Configuración - Biblioteca</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 0; }
        .page { max-width: 780px; margin: 32px auto; padding: 24px; }
        .header { display:flex; justify-content:space-between; align-items:center; background:#4338ca; color:white; padding:18px; border-radius:16px; }
        .header a { color:#e0e7ff; text-decoration:none; }
        .toolbar { margin: 20px 0; }
        .button { display:inline-block; background:#2563eb; color:white; padding:12px 18px; border-radius:10px; text-decoration:none; }
        .card { background:white; border-radius:18px; padding:24px; box-shadow:0 18px 40px rgba(15,23,42,0.08); margin-top:18px; }
        .form-row { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
        label { display:block; margin-bottom:8px; color:#334155; font-weight:600; }
        input { width:100%; padding:8px 10px; min-height:40px; box-sizing:border-box; border:1px solid #cbd5e1; border-radius:12px; font-size:16px; }
        button { margin-top:22px; width:100%; padding:14px; border:none; border-radius:14px; background:#2563eb; color:white; font-size:16px; cursor:pointer; }
        .alert { padding:14px 16px; border-radius:12px; margin: 16px 0; }
        .alert-success { background:#dcfce7; color:#166534; }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div>
            <h1>Configuración de préstamos</h1>
            <p th:text="'Administrador: ' + ${username}"></p>
        </div>
        <div>
            <a class="button" href="/admin/usuarios">Usuarios</a>
            <a class="button" href="/admin/documentos">Documentos</a>
            <a class="button" href="/admin/prestamos">Préstamos</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card">
        <form th:action="@{/admin/configuracion}" method="post">
            <div class="form-row">
                <div>
                    <label for="maxPrestamosAlumno">Máx. préstamos alumno</label>
                    <input id="maxPrestamosAlumno" name="maxPrestamosAlumno" type="number" min="1" th:value="${maxPrestamosAlumno}" required />
                </div>
                <div>
                    <label for="maxPrestamosProfesor">Máx. préstamos profesor</label>
                    <input id="maxPrestamosProfesor" name="maxPrestamosProfesor" type="number" min="1" th:value="${maxPrestamosProfesor}" required />
                </div>
                <div>
                    <label for="diasPrestamoAlumno">Días préstamo alumno</label>
                    <input id="diasPrestamoAlumno" name="diasPrestamoAlumno" type="number" min="1" th:value="${diasPrestamoAlumno}" required />
                </div>
                <div>
                    <label for="diasPrestamoProfesor">Días préstamo profesor</label>
                    <input id="diasPrestamoProfesor" name="diasPrestamoProfesor" type="number" min="1" th:value="${diasPrestamoProfesor}" required />
                </div>
                <div>
                    <label for="moraDiaria">Mora diaria</label>
                    <input id="moraDiaria" name="moraDiaria" type="number" step="0.1" min="0" th:value="${moraDiaria}" required />
                </div>
            </div>
            <button type="submit">Guardar configuración</button>
        </form>
    </div>
</div>
</body>
</html>
