<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Nuevo Usuario - Biblioteca</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 0; }
        .page { max-width: 620px; margin: 32px auto; padding: 24px; }
        .card { background:white; border-radius:18px; padding:28px; box-shadow:0 18px 40px rgba(15,23,42,0.08); }
        h1 { margin-top:0; }
        label { display:block; margin-top:18px; color:#334155; }
        input, select { width:100%; padding:8px 10px; min-height:40px; box-sizing:border-box; border:1px solid #cbd5e1; border-radius:12px; margin-top:8px; font-size:16px; }
        button { margin-top:22px; width:100%; padding:14px; border:none; border-radius:14px; background:#2563eb; color:white; font-size:16px; cursor:pointer; }
        .alert-error { background:#fee2e2; color:#991b1b; padding:12px 16px; border-radius:12px; margin-top:18px; }
        .nav { margin-bottom:18px; }
        .nav a { color:#2563eb; text-decoration:none; margin-right:16px; }
        .button { display:inline-block; background:#2563eb; color:white; padding:10px 14px; border-radius:12px; text-decoration:none; }
    </style>
</head>
<body>
<div class="page">
    <div class="nav">
        <a class="button" th:href="@{/admin/usuarios}">&larr; Volver a usuarios</a>
        <a class="button" th:href="@{/dashboard}">Inicio</a>
    </div>
    <div class="card">
        <h1>Crear nuevo usuario</h1>

        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <form th:action="@{/admin/usuarios}" method="post">
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" type="text" required />

            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" required />

            <label for="rol">Rol</label>
            <select id="rol" name="rol" required>
                <option value="ADMIN">ADMIN</option>
                <option value="PROFESOR">PROFESOR</option>
                <option value="ALUMNO">ALUMNO</option>
            </select>

            <button type="submit">Crear usuario</button>
        </form>
    </div>
</div>
</body>
</html>
